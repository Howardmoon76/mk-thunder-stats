<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Details</title>

<style>
body {
margin: 0;
font-family: Arial;
background: linear-gradient(180deg, #061116 0%, #0a1f27 100%);
color: white;
padding: 30px;
}

.card {
background: rgba(255,255,255,0.08);
border: 1px solid rgba(30,199,217,0.3);
border-radius: 16px;
padding: 20px;
margin-bottom: 20px;
}

h1 {
margin-top: 0;
}

.score {
font-size: 3rem;
color: #1ec7d9;
font-weight: bold;
}

.meta {
opacity: 0.8;
}

a {
color: #00e0c6;
}
</style>
</head>

<body>

<a href="index.html">← Back to stats</a>

<div id="match">Loading...</div>

<script>
const params = new URLSearchParams(window.location.search);
const matchId = params.get("id");

fetch("data.json")
.then(res => res.json())
.then(data => {

const game = data.games.find(g => g.id === matchId);

if (!game) {
document.getElementById("match").innerHTML = "Match not found";
return;
}

document.getElementById("match").innerHTML = `
<div class="card">
<h1>MK Thunder vs ${game.opponent}</h1>
<div class="score">${game.gf} - ${game.ga}</div>
<div class="meta">
${game.date} • ${game.homeAway} • ${game.competition} • ${game.result}
</div>
</div>
`;
});
</script>

</body>
</html>
