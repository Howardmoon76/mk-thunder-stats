<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MK Thunder Player Profile</title>

<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: Arial, Helvetica, sans-serif;
color: #ffffff;
background:
radial-gradient(circle at top, rgba(35, 185, 205, 0.15), transparent 35%),
linear-gradient(180deg, #061116 0%, #0a1f27 45%, #0d2a33 100%);
min-height: 100vh;
}

header {
text-align: center;
padding: 30px 20px 10px;
border-bottom: 2px solid rgba(30, 199, 217, 0.35);
background: rgba(8, 20, 26, 0.75);
}

.header-content {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 12px;
}

.logo {
width: 180px;
max-width: 90%;
display: block;
margin: 0 auto;
filter: drop-shadow(0 0 10px #00e0c6);
}

header h1 {
margin: 10px 0 0;
font-size: 32px;
font-weight: 800;
letter-spacing: 1px;
}

header p {
margin: 0;
opacity: 0.85;
font-size: 14px;
color: #cdeef0;
}

.header-divider {
height: 2px;
width: 80%;
margin: 20px auto 0;
background: linear-gradient(to right, transparent, #00e0c6, transparent);
}

.container {
max-width: 1100px;
margin: 0 auto;
padding: 28px 18px 40px;
}

.back-link {
display: inline-block;
margin-bottom: 18px;
padding: 10px 16px;
border-radius: 10px;
border: 1px solid rgba(0, 224, 198, 0.45);
color: #00e0c6;
text-decoration: none;
font-weight: 700;
transition: 0.2s ease;
background: transparent;
}

.back-link:hover {
background: rgba(0, 224, 198, 0.08);
box-shadow: 0 0 12px rgba(0, 224, 198, 0.2);
}

.profile-card {
background: linear-gradient(180deg, rgba(19, 48, 57, 0.96), rgba(12, 35, 43, 0.96));
border: 1px solid rgba(30, 199, 217, 0.22);
border-radius: 18px;
padding: 24px;
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
}

.profile-top {
display: grid;
grid-template-columns: 260px 1fr;
gap: 26px;
align-items: center;
margin-bottom: 26px;
}

.profile-image-wrap {
text-align: center;
}

.profile-image {
width: 240px;
height: 240px;
max-width: 100%;
object-fit: cover;
border-radius: 18px;
border: 2px solid #00e0c6;
box-shadow: 0 0 18px rgba(0, 224, 198, 0.5);
background: rgba(255,255,255,0.04);
}

.player-name {
font-size: 2.5rem;
font-weight: 900;
line-height: 1.1;
margin-bottom: 10px;
}

.player-meta {
color: #d7edf0;
font-size: 1rem;
margin-bottom: 8px;
}

.player-bio {
margin-top: 14px;
font-size: 1rem;
line-height: 1.6;
color: #cfe6ea;
}

.section-title {
margin: 0 0 16px;
color: #9ee9f2;
font-size: 1.1rem;
text-transform: uppercase;
letter-spacing: 0.7px;
}

.stats-grid {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 16px;
margin-bottom: 24px;
}

.stat-box {
background: rgba(0, 224, 198, 0.05);
border: 1px solid rgba(30, 199, 217, 0.2);
border-radius: 16px;
padding: 18px 14px;
text-align: center;
}

.stat-label {
font-size: 0.9rem;
color: #bfe4e8;
text-transform: uppercase;
letter-spacing: 0.5px;
margin-bottom: 8px;
}

.stat-number {
font-size: 2rem;
font-weight: 900;
color: #1ec7d9;
line-height: 1;
}

.extra-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 20px;
}

.info-box {
background: rgba(255,255,255,0.03);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 16px;
padding: 18px;
}

.info-row {
margin-bottom: 10px;
color: #d7edf0;
line-height: 1.5;
}

.info-row:last-child {
margin-bottom: 0;
}

.info-label {
color: #9ee9f2;
font-weight: 700;
}

.error-box {
background: rgba(255, 82, 82, 0.08);
border: 1px solid rgba(255, 82, 82, 0.3);
border-radius: 16px;
padding: 20px;
color: #ffd7d7;
}

@media (max-width: 900px) {
.profile-top {
grid-template-columns: 1fr;
text-align: center;
}

.stats-grid {
grid-template-columns: repeat(2, 1fr);
}

.extra-grid {
grid-template-columns: 1fr;
}
}

@media (max-width: 600px) {
.logo {
width: 140px;
}

header h1 {
font-size: 2rem;
}

.player-name {
font-size: 2rem;
}

.stats-grid {
grid-template-columns: 1fr 1fr;
}

.profile-image {
width: 200px;
height: 200px;
}
}
</style>
</head>
<body>
<header>
<div class="header-content">
<img src="logo.png" alt="MK Thunder Logo" class="logo">
<div>
<h1>MK Thunder Player Profile</h1>
<p>Player stats and profile details</p>
</div>
</div>
<div class="header-divider"></div>
</header>

<div class="container">
<a href="index.html" class="back-link">← Back to Stats</a>

<div id="playerProfile">Loading player...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const playerName = params.get("name");

fetch("data.json")
.then(response => {
if (!response.ok) {
throw new Error("Could not load data.json");
}
return response.json();
})
.then(data => {
const players = data.players || [];
const profileContainer = document.getElementById("playerProfile");

if (!playerName) {
profileContainer.innerHTML = `
<div class="error-box">
No player selected.
</div>
`;
return;
}

const player = players.find(p => p.name.toLowerCase() === playerName.toLowerCase());

if (!player) {
profileContainer.innerHTML = `
<div class="error-box">
Player not found.
</div>
`;
return;
}

document.title = `${player.name} - MK Thunder Stats`;

profileContainer.innerHTML = `
<div class="profile-card">
<div class="profile-top">
<div class="profile-image-wrap">
<img src="${player.image || 'placeholder.png'}" alt="${player.name}" class="profile-image">
</div>

<div>
<div class="player-name">${player.name}</div>
<div class="player-meta"><strong>Number:</strong> ${player.number || "TBC"}</div>
<div class="player-meta"><strong>Position:</strong> ${player.position || "TBC"}</div>
<div class="player-meta"><strong>Shoots:</strong> ${player.shoots || "TBC"}</div>
<div class="player-meta"><strong>Status:</strong> ${player.status || "Active"}</div>
<div class="player-bio">${player.bio || "Player bio coming soon."}</div>
</div>
</div>

<h2 class="section-title">Season Stats</h2>
<div class="stats-grid">
<div class="stat-box">
<div class="stat-label">GP</div>
<div class="stat-number">${player.gp ?? 0}</div>
</div>
<div class="stat-box">
<div class="stat-label">Goals</div>
<div class="stat-number">${player.goals ?? 0}</div>
</div>
<div class="stat-box">
<div class="stat-label">Assists</div>
<div class="stat-number">${player.assists ?? 0}</div>
</div>
<div class="stat-box">
<div class="stat-label">Points</div>
<div class="stat-number">${player.points ?? 0}</div>
</div>
<div class="stat-box">
<div class="stat-label">PIM</div>
<div class="stat-number">${player.pim ?? 0}</div>
</div>
</div>

<div class="extra-grid">
<div class="info-box">
<h2 class="section-title">Player Info</h2>
<div class="info-row"><span class="info-label">Name:</span> ${player.name}</div>
<div class="info-row"><span class="info-label">Number:</span> ${player.number || "TBC"}</div>
<div class="info-row"><span class="info-label">Position:</span> ${player.position || "TBC"}</div>
<div class="info-row"><span class="info-label">Shoots:</span> ${player.shoots || "TBC"}</div>
</div>

<div class="info-box">
<h2 class="section-title">More</h2>
<div class="info-row"><span class="info-label">Status:</span> ${player.status || "Active"}</div>
<div class="info-row"><span class="info-label">Sponsor:</span> ${player.sponsor || "Not added yet"}</div>
<div class="info-row"><span class="info-label">Favourite moment:</span> ${player.favouriteMoment || "Coming soon"}</div>
</div>
</div>
</div>
`;
})
.catch(error => {
console.error(error);
document.getElementById("playerProfile").innerHTML = `
<div class="error-box">
Could not load player data.
</div>
`;
});
</script>
</body>
</html>
