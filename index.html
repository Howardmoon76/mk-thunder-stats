<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MK Thunder Stats</title>
<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: Arial, sans-serif;
background: linear-gradient(180deg, #08161b 0%, #0d2a33 100%);
color: #ffffff;
}

header {
background: #102a33;
border-bottom: 3px solid #1ec7d9;
padding: 24px 16px;
text-align: center;
}

header h1 {
margin: 0;
font-size: 2.2rem;
letter-spacing: 1px;
}

.container {
max-width: 1100px;
margin: 0 auto;
padding: 24px 16px 40px;
}

.top-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 20px;
margin-bottom: 24px;
}

.leaders-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 20px;
margin-bottom: 24px;
}

.card {
background: rgba(18, 47, 56, 0.95);
border: 1px solid rgba(30, 199, 217, 0.25);
border-radius: 14px;
padding: 18px;
box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
}

.card h2 {
margin: 0 0 14px 0;
font-size: 1.3rem;
color: #9ee9f2;
}

.stat-name {
font-size: 1.4rem;
font-weight: bold;
margin-bottom: 8px;
}

.stat-value {
font-size: 2rem;
font-weight: bold;
color: #1ec7d9;
}

.sub-text {
color: #d6e8eb;
margin-top: 6px;
font-size: 0.95rem;
}

.leaders-list div,
.results-list div {
padding: 10px 0;
border-bottom: 1px solid rgba(255,255,255,0.08);
}

.leaders-list div:last-child,
.results-list div:last-child {
border-bottom: none;
}

.status {
color: #cfeef2;
font-style: italic;
}

.footer-note {
margin-top: 24px;
color: #b9d7dc;
font-size: 0.9rem;
text-align: center;
}

@media (max-width: 600px) {
header h1 {
font-size: 1.8rem;
}

.stat-value {
font-size: 1.6rem;
}
}
</style>
</head>
<body>
<header>
<h1>MK Thunder Stats</h1>
</header>

<div class="container">
<div class="top-grid">
<div class="card">
<h2>Top Scorer</h2>
<div id="topScorer" class="status">Loading...</div>
</div>

<div class="card">
<h2>Latest Result</h2>
<div id="latestGame" class="status">Loading...</div>
</div>
</div>

<div class="leaders-grid">
<div class="card">
<h2>Points Leader</h2>
<div id="pointsLeader" class="status">Loading...</div>
</div>

<div class="card">
<h2>Goals Leader</h2>
<div id="goalsLeader" class="status">Loading...</div>
</div>

<div class="card">
<h2>Shots Leader</h2>
<div id="shotsLeader" class="status">Loading...</div>
</div>
</div>

<div class="card">
<h2>Team Leaders</h2>
<div id="leaders" class="leaders-list status">Loading...</div>
</div>

<div class="card" style="margin-top: 24px;">
<h2>Recent Results</h2>
<div id="recentResults" class="results-list status">Loading...</div>
</div>

<div class="footer-note">
Live data pulled from your Google Sheet
</div>
</div>

<script>
const playerStatsURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTIhWEAqdwoi_JBBpKoOkw8POi3FEdZzUTjtEchy1YFWcxumy_Oq5hOxy3mZUWPvQ2Pt_anyThApnH/pub?gid=455521592&single=true&output=csv";
const gamesURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTIhWEAqdwoi_JBBpKoOkw8POi3FEdZzUTjtEchy1YFWcxumy_Oq5hOxy3mZUWPvQ2Pt_anyThApnH/pub?gid=1026373784&single=true&output=csv";

function parseCSV(text) {
const rows = text.trim().split(/\r?\n/);
const headers = rows[0].split(",").map(h => h.trim());

return rows.slice(1).map(row => {
const values = row.split(",");
const obj = {};
headers.forEach((header, i) => {
obj[header] = values[i] ? values[i].trim() : "";
});
return obj;
});
}

function toNumber(value) {
return Number(value) || 0;
}

fetch(playerStatsURL)
.then(response => response.text())
.then(data => {
const players = parseCSV(data);

players.sort((a, b) => toNumber(b.Points) - toNumber(a.Points));

const topPlayer = players[0];
document.getElementById("topScorer").innerHTML = `
<div class="stat-name">${topPlayer.Name}</div>
<div class="stat-value">${topPlayer.Points} pts</div>
<div class="sub-text">${topPlayer.Goals} goals • ${topPlayer.Assists} assists</div>
`;

const goalsLeader = [...players].sort((a, b) => toNumber(b.Goals) - toNumber(a.Goals))[0];
const shotsLeader = [...players].sort((a, b) => toNumber(b.Shots) - toNumber(a.Shots))[0];

document.getElementById("pointsLeader").innerHTML = `
<div class="stat-name">${topPlayer.Name}</div>
<div class="stat-value">${topPlayer.Points}</div>
<div class="sub-text">Points</div>
`;

document.getElementById("goalsLeader").innerHTML = `
<div class="stat-name">${goalsLeader.Name}</div>
<div class="stat-value">${goalsLeader.Goals}</div>
<div class="sub-text">Goals</div>
`;

document.getElementById("shotsLeader").innerHTML = `
<div class="stat-name">${shotsLeader.Name}</div>
<div class="stat-value">${shotsLeader.Shots}</div>
<div class="sub-text">Shots</div>
`;

let leadersHTML = "";
players.forEach(player => {
leadersHTML += `
<div>
<strong>${player.Name}</strong><br>
GP: ${player.GP} | G: ${player.Goals} | A: ${player.Assists} | PTS: ${player.Points} | Shots: ${player.Shots} | PIM: ${player.PIM}
</div>
`;
});

document.getElementById("leaders").innerHTML = leadersHTML;
})
.catch(error => {
console.error("PlayerStats fetch error:", error);
document.getElementById("topScorer").textContent = "Could not load data.";
document.getElementById("pointsLeader").textContent = "Could not load data.";
document.getElementById("goalsLeader").textContent = "Could not load data.";
document.getElementById("shotsLeader").textContent = "Could not load data.";
document.getElementById("leaders").textContent = "Could not load data.";
});

fetch(gamesURL)
.then(response => response.text())
.then(data => {
const games = parseCSV(data);

const latest = games[games.length - 1];
document.getElementById("latestGame").innerHTML = `
<div class="stat-name">${latest.Opponent}</div>
<div class="stat-value">${latest.GF} - ${latest.GA}</div>
<div class="sub-text">${latest["Home/Away"]} • ${latest.Competition} • ${latest.Result}</div>
`;

const recentGames = [...games].reverse().slice(0, 5);
let resultsHTML = "";

recentGames.forEach(game => {
resultsHTML += `
<div>
<strong>${game.Date}</strong> — ${game.Opponent}<br>
${game["Home/Away"]} | ${game.Competition} | ${game.GF}-${game.GA} (${game.Result})
</div>
`;
});

document.getElementById("recentResults").innerHTML = resultsHTML;
})
.catch(error => {
console.error("Games fetch error:", error);
document.getElementById("latestGame").textContent = "Could not load data.";
document.getElementById("recentResults").textContent = "Could not load data.";
});
</script>
</body>
</html>
