<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MK Thunder Stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: linear-gradient(180deg, #061116 0%, #0a1f27 45%, #0d2a33 100%);
color: white;
}

.container {
max-width: 1000px;
margin: auto;
padding: 20px;
}

h1 {
text-align: center;
margin-bottom: 30px;
}

.section {
margin-bottom: 30px;
}

.card {
background: rgba(255,255,255,0.08);
border: 1px solid rgba(30,199,217,0.3);
border-radius: 18px;
padding: 20px;
}

.result-box {
display: block;
text-decoration: none;
color: white;
}

.result-box:hover {
border-color: #1ec7d9;
}

.small {
opacity: 0.8;
margin-top: 6px;
}

.table {
width: 100%;
border-collapse: collapse;
}

.table th, .table td {
padding: 8px;
text-align: left;
}

.table th {
border-bottom: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>
<div class="container">

<h1>MK Thunder Stats</h1>

<!-- NEXT GAME -->
<div class="section">
<div class="card" id="nextGame"></div>
</div>

<!-- LATEST RESULT -->
<div class="section">
<div class="card" id="latestResult"></div>
</div>

<!-- LEAGUE TABLE -->
<div class="section">
<div class="card">
<h2>League Table</h2>
<table class="table" id="leagueTable"></table>
</div>
</div>

</div>

<script>
fetch("data.json")
.then(response => response.json())
.then(data => {

// NEXT GAME
const next = data.nextGame;
document.getElementById("nextGame").innerHTML = `
<h2>Next Game</h2>
<p><strong>MK Thunder vs ${next.opponent}</strong></p>
<div class="small">
${next.date} • ${next.homeAway} • ${next.competition}<br>
Faceoff: ${next.faceoff}
</div>
`;

// LATEST RESULT (CLICKABLE)
const latest = data.recentResults[0];

document.getElementById("latestResult").innerHTML = `
<a href="match.html?id=${latest.id}" class="result-box">
<h2>Latest Result</h2>
<p><strong>MK Thunder ${latest.score} ${latest.opponent}</strong></p>
<div class="small">
${latest.date} • ${latest.homeAway} • ${latest.competition}<br>
Result: ${latest.result}
</div>
</a>
`;

// LEAGUE TABLE
const table = document.getElementById("leagueTable");

table.innerHTML = `
<tr>
<th>Pos</th>
<th>Team</th>
<th>GP</th>
<th>W</th>
<th>OTW</th>
<th>OTL</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>Pts</th>
</tr>
${data.leagueTable.map(team => `
<tr>
<td>${team.pos}</td>
<td>${team.team}</td>
<td>${team.gp}</td>
<td>${team.w}</td>
<td>${team.otw}</td>
<td>${team.otl}</td>
<td>${team.l}</td>
<td>${team.gf}</td>
<td>${team.ga}</td>
<td>${team.points}</td>
</tr>
`).join("")}
`;
});
</script>

</body>
</html>
