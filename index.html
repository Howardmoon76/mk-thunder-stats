<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MK Thunder Stats</title>

<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: Arial, Helvetica, sans-serif;
color: #ffffff;
background:
radial-gradient(circle at top, rgba(35, 185, 205, 0.15), transparent 35%),
linear-gradient(180deg, #061116 0%, #0a1f27 45%, #0d2a33 100%);
min-height: 100vh;
}

header {
text-align: center;
padding: 30px 20px 10px;
border-bottom: 2px solid rgba(30, 199, 217, 0.35);
background: rgba(8, 20, 26, 0.75);
}

.header-content {
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
}

.logo {
width: 180px;
max-width: 90%;
filter: drop-shadow(0 0 10px #00e0c6);
}

header h1 {
margin: 10px 0 0;
font-size: 32px;
font-weight: 800;
}

header p {
margin: 0;
opacity: 0.85;
font-size: 14px;
}

.header-divider {
height: 2px;
width: 80%;
margin: 20px auto 0;
background: linear-gradient(to right, transparent, #00e0c6, transparent);
}

.container {
max-width: 1200px;
margin: 0 auto;
padding: 28px 18px 40px;
}

.hero-grid,
.leaders-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 20px;
margin-bottom: 22px;
}

.bottom-grid {
display: grid;
grid-template-columns: 1.2fr 1fr;
gap: 20px;
}

.card {
background: linear-gradient(180deg, rgba(19, 48, 57, 0.96), rgba(12, 35, 43, 0.96));
border: 1px solid rgba(30, 199, 217, 0.22);
border-radius: 18px;
padding: 20px;
transition: 0.2s;
}

.card:hover {
transform: translateY(-5px);
box-shadow: 0 0 15px rgba(0, 224, 198, 0.35);
}

.card h2 {
margin-bottom: 16px;
color: #9ee9f2;
}

.stat-name {
font-size: 2rem;
font-weight: 800;
}

.stat-value {
font-size: 3rem;
color: #1ec7d9;
}

.sub-text {
color: #d7edf0;
}

.mini-name {
font-weight: 800;
}

.mini-value {
font-size: 2rem;
color: #1ec7d9;
}

.leader-row,
.result-row {
padding: 12px 0;
border-bottom: 1px solid rgba(255,255,255,0.1);
}

.leader-name {
font-weight: bold;
}

.top-player {
display: flex;
justify-content: space-between;
align-items: center;
}

.player-img {
width: 100px;
height: 100px;
border-radius: 50%;
border: 2px solid #00e0c6;
}

.show-more-btn {
margin-top: 15px;
background: transparent;
color: #00e0c6;
border: 1px solid #00e0c6;
padding: 8px 12px;
cursor: pointer;
border-radius: 8px;
}

@media (max-width: 800px) {
.hero-grid,
.leaders-grid,
.bottom-grid {
grid-template-columns: 1fr;
}
}
</style>
</head>

<body>

<header>
<div class="header-content">
<img src="logo.png" class="logo">
<h1>MK Thunder Stats</h1>
<p>Live team leaders, results and season stats</p>
</div>
<div class="header-divider"></div>
</header>

<div class="container">

<div class="hero-grid">
<div class="card"><h2>Top Scorer</h2><div id="topScorer">Loading...</div></div>
<div class="card"><h2>Latest Result</h2><div id="latestGame">Loading...</div></div>
<div class="card"><h2>Next Game</h2><div id="nextGame">Loading...</div></div>
</div>

<div class="leaders-grid">
<div class="card"><h2>Points Leader</h2><div id="pointsLeader"></div></div>
<div class="card"><h2>Goals Leader</h2><div id="goalsLeader"></div></div>
<div class="card"><h2>PIM Leader</h2><div id="pimLeader"></div></div>
</div>

<div class="bottom-grid">
<div class="card">
<h2>Team Leaders</h2>
<div id="leaders"></div>
</div>

<div class="card">
<h2>Recent Results</h2>
<div id="recentResults"></div>
</div>
</div>

</div>

<script>
fetch("data.json")
.then(r => r.json())
.then(data => {

const players = [...data.players].sort((a,b)=>b.points-a.points);
const games = data.games;

const topPlayer = players[0];
const goalsLeader = [...players].sort((a,b)=>b.goals-a.goals)[0];
const pimLeader = [...players].sort((a,b)=>b.pim-a.pim)[0];

// Top scorer
document.getElementById("topScorer").innerHTML = `
<div class="top-player">
<div>
<div class="stat-name">${topPlayer.name}</div>
<div class="stat-value">${topPlayer.points}</div>
</div>
<img src="${topPlayer.image}" class="player-img">
</div>`;

// mini stats
document.getElementById("pointsLeader").innerHTML = `${topPlayer.name}<br>${topPlayer.points}`;
document.getElementById("goalsLeader").innerHTML = `${goalsLeader.name}<br>${goalsLeader.goals}`;
document.getElementById("pimLeader").innerHTML = `${pimLeader.name}<br>${pimLeader.pim}`;

// 👉 TEAM LEADERS WITH SHOW MORE
const leadersDiv = document.getElementById("leaders");
let showAll = false;

function renderLeaders() {
const list = showAll ? players : players.slice(0,5);

leadersDiv.innerHTML = `
${list.map(p=>`
<div class="leader-row">
<div class="leader-name">${p.name}</div>
<div>GP:${p.gp} G:${p.goals} A:${p.assists} PTS:${p.points}</div>
</div>
`).join("")}
${players.length > 5 ? `<button class="show-more-btn" id="toggleBtn">${showAll ? "Show Less" : "Show More"}</button>` : ""}
`;

const btn = document.getElementById("toggleBtn");
if(btn){
btn.onclick = () => {
showAll = !showAll;
renderLeaders();
}
}
}

renderLeaders();

// results
const latest = games[games.length-1];
document.getElementById("latestGame").innerHTML = `${latest.opponent}<br>${latest.gf}-${latest.ga}`;

const recent = [...games].reverse().slice(0,5);
document.getElementById("recentResults").innerHTML = recent.map(g=>`
<div class="result-row">${g.date} ${g.opponent} ${g.gf}-${g.ga}</div>
`).join("");

});
</script>

</body>
</html>
