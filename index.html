<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MK Thunder Stats</title>

<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
font-family: Arial, Helvetica, sans-serif;
color: #ffffff;
background:
radial-gradient(circle at top, rgba(35, 185, 205, 0.15), transparent 35%),
linear-gradient(180deg, #061116 0%, #0a1f27 45%, #0d2a33 100%);
min-height: 100vh;
}

header {
text-align: center;
padding: 30px 20px 10px;
border-bottom: 2px solid rgba(30, 199, 217, 0.35);
background: rgba(8, 20, 26, 0.75);
}

.header-content {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 12px;
}

.logo {
width: 180px;
max-width: 90%;
display: block;
margin: 0 auto;
filter: drop-shadow(0 0 10px #00e0c6);
}

header h1 {
margin: 10px 0 0;
font-size: 32px;
font-weight: 800;
letter-spacing: 1px;
}

header p {
margin: 0;
opacity: 0.85;
font-size: 14px;
color: #cdeef0;
}

.header-divider {
height: 2px;
width: 80%;
margin: 20px auto 0;
background: linear-gradient(to right, transparent, #00e0c6, transparent);
}

.container {
max-width: 1200px;
margin: 0 auto;
padding: 28px 18px 40px;
}

.hero-grid {
display: grid;
grid-template-columns: 1.2fr 1fr;
gap: 20px;
margin-bottom: 22px;
}

.leaders-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 20px;
margin-bottom: 22px;
}

.bottom-grid {
display: grid;
grid-template-columns: 1.2fr 1fr;
gap: 20px;
}

.card {
background: linear-gradient(180deg, rgba(19, 48, 57, 0.96), rgba(12, 35, 43, 0.96));
border: 1px solid rgba(30, 199, 217, 0.22);
border-radius: 18px;
padding: 20px;
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}

.card:hover {
transform: translateY(-5px);
border-color: rgba(30, 199, 217, 0.42);
box-shadow: 0 0 15px rgba(0, 224, 198, 0.35);
}

.hero-card {
min-height: 190px;
}

.card h2 {
margin: 0 0 16px;
color: #9ee9f2;
font-size: 1.15rem;
text-transform: uppercase;
letter-spacing: 0.7px;
}

.stat-name {
font-size: 2rem;
font-weight: 800;
margin-bottom: 10px;
line-height: 1.1;
}

.stat-value {
font-size: 3rem;
font-weight: 900;
color: #1ec7d9;
line-height: 1;
margin-bottom: 10px;
}

.sub-text {
color: #d7edf0;
font-size: 1rem;
}

.mini-name {
font-size: 1.5rem;
font-weight: 800;
margin-bottom: 10px;
}

.mini-value {
font-size: 2.4rem;
font-weight: 900;
color: #1ec7d9;
margin-bottom: 8px;
line-height: 1;
}

.mini-label {
color: #c8e2e7;
font-size: 0.95rem;
}

.leaders-list .leader-row,
.results-list .result-row {
padding: 14px 0;
border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.leaders-list .leader-row:last-child,
.results-list .result-row:last-child {
border-bottom: none;
}

.leader-name,
.result-title {
font-weight: 700;
font-size: 1.05rem;
margin-bottom: 4px;
}

.leader-stats,
.result-meta {
color: #c9e1e6;
font-size: 0.95rem;
}

.footer-note {
text-align: center;
color: #8fb8bf;
margin-top: 28px;
font-size: 0.9rem;
}

@media (max-width: 900px) {
.hero-grid,
.leaders-grid,
.bottom-grid {
grid-template-columns: 1fr;
}
}

@media (max-width: 600px) {
.logo {
width: 140px;
}

header h1 {
font-size: 2rem;
}

.stat-name {
font-size: 1.6rem;
}

.stat-value {
font-size: 2.4rem;
}

.mini-name {
font-size: 1.3rem;
}

.mini-value {
font-size: 2rem;
}
}
</style>
</head>
<body>
<header>
<div class="header-content">
<img src="logo.png" alt="MK Thunder Logo" class="logo">
<div>
<h1>MK Thunder Stats</h1>
<p>Live team leaders, results and season stats</p>
</div>
