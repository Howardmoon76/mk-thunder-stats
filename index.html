<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MK Thunder Stats</title>

<style>
* { box-sizing: border-box; }

body {
margin: 0;
font-family: Arial, Helvetica, sans-serif;
color: #ffffff;
background:
radial-gradient(circle at top, rgba(35, 185, 205, 0.15), transparent 35%),
linear-gradient(180deg, #061116 0%, #0a1f27 45%, #0d2a33 100%);
min-height: 100vh;
}

/* NEW */
.result-link {
color: #ffffff;
text-decoration: none;
display: block;
}
.result-link:hover .result-title,
.result-link:hover .stat-name {
color: #00e0c6;
text-decoration: underline;
}

header {
text-align: center;
padding: 30px 20px 10px;
border-bottom: 2px solid rgba(30, 199, 217, 0.35);
background: rgba(8, 20, 26, 0.75);
}

.header-content {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 12px;
}

.logo {
width: 180px;
max-width: 90%;
display: block;
margin: 0 auto;
filter: drop-shadow(0 0 10px #00e0c6);
}

header h1 {
margin: 10px 0 0;
font-size: 32px;
font-weight: 800;
letter-spacing: 1px;
}

header p {
margin: 0;
opacity: 0.85;
font-size: 14px;
color: #cdeef0;
}

.header-divider {
height: 2px;
width: 80%;
margin: 20px auto 0;
background: linear-gradient(to right, transparent, #00e0c6, transparent);
}

.container {
max-width: 1200px;
margin: 0 auto;
padding: 28px 18px 40px;
}

.hero-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 20px;
margin-bottom: 22px;
}

.leaders-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 20px;
margin-bottom: 22px;
}

.bottom-grid {
display: grid;
grid-template-columns: 1.2fr 1fr;
gap: 20px;
margin-bottom: 20px;
}

.card {
background: linear-gradient(180deg, rgba(19, 48, 57, 0.96), rgba(12, 35, 43, 0.96));
border: 1px solid rgba(30, 199, 217, 0.22);
border-radius: 18px;
padding: 20px;
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
transition: 0.2s ease;
}

.card:hover {
transform: translateY(-5px);
border-color: rgba(30, 199, 217, 0.42);
box-shadow: 0 0 15px rgba(0, 224, 198, 0.35);
}

.hero-card { min-height: 190px; }

.card h2 {
margin: 0 0 16px;
color: #9ee9f2;
font-size: 1.15rem;
text-transform: uppercase;
letter-spacing: 0.7px;
}

.stat-name { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
.stat-value { font-size: 3rem; font-weight: 900; color: #1ec7d9; }
.sub-text { color: #d7edf0; }

.result-badge {
display: inline-block;
padding: 4px 10px;
border-radius: 999px;
font-size: 0.75rem;
font-weight: 800;
margin-right: 8px;
color: #fff;
}

.badge-win { background: #00e676; }
.badge-loss { background: #ff5252; }
.badge-ot { background: #ffc107; color: #000; }

.result-row {
padding: 14px 0;
border-bottom: 1px solid rgba(255,255,255,0.08);
}

.result-title { font-weight: 700; }
.result-meta { color: #c9e1e6; font-size: 0.95rem; }

.table-wrap { overflow-x: auto; }
.stats-table { width: 100%; border-collapse: collapse; }
.stats-table th, .stats-table td {
padding: 10px;
text-align: center;
border-bottom: 1px solid rgba(255,255,255,0.08);
}
.mk-row { background: rgba(0,224,198,0.08); }

</style>
</head>

<body>

<div class="container">

<div class="hero-grid">
<div class="card hero-card">
<h2>Latest Result</h2>
<div id="latestGame">Loading...</div>
</div>
</div>

<div class="bottom-grid">
<div class="card">
<h2>Recent Results</h2>
<div id="recentResults">Loading...</div>
</div>
</div>

</div>

<script>
fetch("data.json")
.then(res => res.json())
.then(data => {

const games = data.games || [];

const latestGame = games[games.length - 1];

let badgeClass = "badge-loss";
let badgeText = "L";

if (latestGame.result === "W") {
badgeClass = "badge-win";
badgeText = "W";
}
if (latestGame.result.includes("OT")) {
badgeClass = "badge-ot";
badgeText = "OT";
}

/* CLICKABLE LATEST */
document.getElementById("latestGame").innerHTML = `
<a class="result-link" href="match.html?id=${latestGame.id}">
<div class="stat-name">
<span class="result-badge ${badgeClass}">${badgeText}</span>
${latestGame.opponent}
</div>
<div class="stat-value">${latestGame.gf} - ${latestGame.ga}</div>
<div class="sub-text">${latestGame.homeAway} • ${latestGame.competition}</div>
</a>
`;

/* CLICKABLE RECENT */
document.getElementById("recentResults").innerHTML = games.slice().reverse().map(game => {

let bClass = game.result === "W" ? "badge-win" : "badge-loss";
if (game.result.includes("OT")) bClass = "badge-ot";

return `
<a class="result-link result-row" href="match.html?id=${game.id}">
<div class="result-title">
<span class="result-badge ${bClass}">${game.result}</span>
${game.date} — ${game.opponent}
</div>
<div class="result-meta">
${game.gf}-${game.ga}
</div>
</a>
`;

}).join("");

});
</script>

</body>
</html>
